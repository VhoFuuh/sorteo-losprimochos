<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorteo Los Primochos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0f0a1e;
      background-image: radial-gradient(ellipse at top, #1a0a3e 0%, #0f0a1e 60%);
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px;
    }
    .logo-wrap { width: 100%; max-width: 420px; margin-bottom: 20px; }
    .logo-wrap img { width: 100%; border-radius: 12px; }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 28px 24px;
      width: 100%; max-width: 420px;
      backdrop-filter: blur(10px);
    }
    h1 {
      font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px;
      background: linear-gradient(90deg, #e040fb, #00bcd4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; color: #e2e8f0; font-size: 15px; outline: none; transition: border-color .2s;
    }
    .form-group input:focus { border-color: #e040fb; }
    .form-group input::placeholder { color: #475569; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; transition: .2s;
      background: linear-gradient(90deg, #e040fb, #00bcd4); color: white; margin-top: 4px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 14px; text-align: center; display: none; }
    .msg.error   { background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #f87171; display: block; }
    .msg.success { background: rgba(34,197,94,.15);  border: 1px solid rgba(34,197,94,.3); color: #4ade80; display: block; }
    .success-screen { display: none; text-align: center; padding: 20px 0; }
    .success-screen .icono { font-size: 64px; margin-bottom: 12px; }
    .success-screen h2 { font-size: 24px; margin-bottom: 8px; color: #4ade80; }
    .success-screen p  { color: #94a3b8; font-size: 14px; line-height: 1.6; }
    .footer { margin-top: 24px; font-size: 11px; color: #475569; text-align: center; }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="logo.jpg" alt="Los Primochos" onerror="this.style.display='none'" />
  </div>

  <div class="card">
    <div id="form-section">
      <h1>🎟️ Participa en el Sorteo</h1>
      <p class="subtitle">Ingresa tu código de boleta y tus datos para participar</p>

      <div class="form-group">
        <label>Código de boleta</label>
        <input type="text" id="codigo" placeholder="BOL-20260331-0001" />
      </div>
      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label>RUT</label>
        <input type="text" id="rut" placeholder="12.345.678-9" oninput="formatearRut(this)" />
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" id="telefono" placeholder="+56 9 1234 5678" />
      </div>

      <button class="btn" id="btn-participar" onclick="participar()">Participar</button>
      <div class="msg" id="msg"></div>
    </div>

    <div class="success-screen" id="success-screen">
      <div class="icono">🎉</div>
      <h2>¡Estás participando!</h2>
      <p>Tu código fue registrado.<br>Te avisaremos si eres el ganador.<br><br>¡Buena suerte!</p>
    </div>
  </div>

  <div class="footer">Los Primochos — Licores · Confites · Abarrotes<br>Patria 98, Carampangue, Arauco</div>

  <script>
    const SUPABASE_URL = 'https://hapdvdzxxibnbgfezhvu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhcGR2ZHp4eGlibmJnZmV6aHZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTc5OTEsImV4cCI6MjA5MDQ5Mzk5MX0.BWWUDKTmpRNZQfK5bbRFDTCF7JJE2msvsnJs4jIgAPM';

    const params = new URLSearchParams(location.search);
    if (params.get('codigo')) document.getElementById('codigo').value = params.get('codigo');

    function formatearRut(input) {
      let val = input.value.replace(/[^0-9kK]/g, '').toUpperCase();
      if (val.length > 9) val = val.slice(0, 9);
      if (val.length > 1) {
        const cuerpo = val.slice(0, -1).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        input.value = `${cuerpo}-${val.slice(-1)}`;
      } else { input.value = val; }
    }

    function mostrarMsg(texto, tipo) {
      const el = document.getElementById('msg');
      el.textContent = texto;
      el.className = 'msg ' + tipo;
    }

    async function supaGet(tabla, filtro) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${filtro}&select=*`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      return res.json();
    }

    async function participar() {
      const codigo   = document.getElementById('codigo').value.trim().toUpperCase();
      const nombre   = document.getElementById('nombre').value.trim();
      const rut      = document.getElementById('rut').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const btn      = document.getElementById('btn-participar');

      if (!codigo || !nombre || !rut || !telefono) {
        mostrarMsg('Completa todos los campos', 'error'); return;
      }

      btn.disabled = true;
      btn.textContent = 'Verificando...';

      // 1. Verificar si está vetado por RUT o teléfono
      const [vetadoRut, vetadoTel] = await Promise.all([
        supaGet('vetados', `rut=eq.${encodeURIComponent(rut)}`),
        supaGet('vetados', `telefono=eq.${encodeURIComponent(telefono)}`)
      ]);
      if (vetadoRut.length || vetadoTel.length) {
        mostrarMsg('No puedes participar en este sorteo.', 'error');
        btn.disabled = false; btn.textContent = 'Participar'; return;
      }

      // 2. Verificar que el código existe y obtener sorteo_id
      const boletas = await supaGet('boletas_validas', `codigo=eq.${encodeURIComponent(codigo)}`);
      if (!boletas.length) {
        mostrarMsg('Código no válido. Verifica que está escrito correctamente.', 'error');
        btn.disabled = false; btn.textContent = 'Participar'; return;
      }
      const sorteo_id = boletas[0].sorteo_id;

      // 3. Verificar que el código no esté ya registrado
      const dupCodigo = await supaGet('participantes', `codigo=eq.${encodeURIComponent(codigo)}`);
      if (dupCodigo.length) {
        mostrarMsg('Este código ya fue registrado.', 'error');
        btn.disabled = false; btn.textContent = 'Participar'; return;
      }

      // 4. Verificar que el RUT no esté ya registrado en este sorteo
      const dupRut = await supaGet('participantes', `rut=eq.${encodeURIComponent(rut)}&sorteo_id=eq.${sorteo_id}`);
      if (dupRut.length) {
        mostrarMsg('Este RUT ya está registrado en el sorteo.', 'error');
        btn.disabled = false; btn.textContent = 'Participar'; return;
      }

      // 5. Registrar participante con sorteo_id
      const regRes = await fetch(`${SUPABASE_URL}/rest/v1/participantes`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json', 'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ codigo, nombre, rut, telefono, sorteo_id })
      });

      if (regRes.ok || regRes.status === 201) {
        document.getElementById('form-section').style.display  = 'none';
        document.getElementById('success-screen').style.display = 'block';
      } else {
        mostrarMsg('Error al registrar. Intenta de nuevo.', 'error');
        btn.disabled = false; btn.textContent = 'Participar';
      }
    }
  </script>
</body>
</html>
